language: c

os: linux

maxtrix:
  include:
    - dist: focal
      env:
        - cc=gcc
    - dist: focal
      env:
        - cc=clang

install:
  - sudo apt-get install libglew-dev mesa-common-dev build-essential mesa-utils libgl1-mesa-dev libgl1-mesa-glx libx11-dev libpng-dev

before_script:
  - export CC=${cc}

script:
  - chmod 700 scripts/configure.sh && ./scripts/configure.sh && make clean all
